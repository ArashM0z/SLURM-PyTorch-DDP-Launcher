job_name: sed2am-ddp
script: train.py
args:
  - --epochs=50
  - --batch-size=256
nodes: 4
gpus_per_node: 4
cpus_per_task: 16
memory: 128G
time: "24:00:00"
partition: gpu-v100
venv: $HOME/envs/drl
modules:
  - python/3.11
  - cuda/12.2
  - nccl/2.18
env:
  WANDB_PROJECT: drl-vrp
  MLFLOW_TRACKING_URI: http://mlflow.internal:5000
nccl_socket_ifname: ib0
